name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy site to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save site files to temp dir
          mkdir -p /tmp/site
          cp index.html about.html dao.html cabinet.html .nojekyll /tmp/site/
          cp -r css js assets /tmp/site/

          # Fetch gh-pages branch
          git fetch origin gh-pages
          git checkout gh-pages

          # Clear everything except .git
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Copy site files back
          cp -r /tmp/site/. .

          # Commit and push
          git add -A
          git diff --cached --quiet || git commit -m "Deploy from main @ ${{ github.sha }}"
          git push origin gh-pages
