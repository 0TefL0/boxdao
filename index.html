<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoxDAO</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Phosphor Icons (CSS-иконки, regular weight) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <div id="header"></div>

  <!-- ═══════ HERO ═══════ -->
  <section class="hero">

    <canvas id="cube-canvas"></canvas>

    <div class="hero-wordmark">
      <div class="hero-title">Box<b>DAO</b></div>
    </div>


  </section>

  <!-- ═══════ СЕКЦИЯ-ЗАГОТОВКА ═══════ -->
  <section class="section">
    <div class="container">
      <div class="section-head">
        <span class="eyebrow">Что это</span>
        <h2>Здесь будет описание проекта</h2>
        <p>Замени этот блок на свой контент. Карточки, токеномика,
           дорожная карта — добавляй секции по этому шаблону.</p>
      </div>
      <div class="card-grid">
        <div class="card">
          <h3>Стейкинг</h3>
          <p>Описание механики стейкинга.</p>
        </div>
        <div class="card">
          <h3>DAO</h3>
          <p>Голосование и управление протоколом.</p>
        </div>
        <div class="card">
          <h3>Revenue Share</h3>
          <p>Распределение дохода среди держателей.</p>
        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <!-- Анимация воды (фон) -->
  <script src="js/water.js"></script>
  <script src="js/brand-cube.js"></script>
  <script src="js/main.js"></script>
  <!-- Изометрический куб в hero -->
  <script src="js/cube.js"></script>
</body>
</html>
