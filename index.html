<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoleFi</title>
  <!-- v2 -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Phosphor Icons (CSS-иконки, regular weight) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    .hero-wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.8s 0.15s both;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(48px, 7vw, 96px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #fff;
    }
    .hero-title b { color: var(--accent); }

    .hero-tagline {
      display: flex;
      align-items: center;
      gap: clamp(8px, 1.5vw, 20px);
      flex-wrap: wrap;
      justify-content: center;
    }
    .hero-tagline span {
      font-family: var(--font-mono);
      font-size: clamp(9px, 1vw, 12px);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      position: relative;
    }
    .hero-tagline span::first-letter {
      color: var(--accent);
      font-size: 1.15em;
    }
    .hero-tagline span:not(:last-child)::after {
      content: '·';
      position: absolute;
      right: calc(-0.5 * clamp(8px, 1.5vw, 20px) - 4px);
      color: rgba(184,255,60,0.3);
    }
  </style>
</head>
<body>

  <div id="header"></div>

  <!-- ═══════ HERO ═══════ -->
  <section class="hero">

    <canvas id="cube-canvas"></canvas>

    <div class="hero-wordmark">
      <div class="hero-title">Dole<b>Fi</b></div>
      <div class="hero-tagline">
        <span>Decentralized</span>
        <span>Ownership</span>
        <span>Liquidity</span>
        <span>Engine</span>
        <span>Finance</span>
      </div>
    </div>

  </section>

  <div id="footer"></div>

  <!-- Анимация воды (фон) -->
  <script src="js/water.js"></script>
  <script src="js/brand-cube.js"></script>
  <script src="js/wallet.js"></script>
  <script src="js/main.js"></script>
  <!-- Изометрический куб в hero -->
  <script src="js/cube.js"></script>
</body>
</html>
