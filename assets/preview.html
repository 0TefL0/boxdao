<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smooth Merging Weightless Cubes</title>

  <style>
    :root {
      --toxic: #b8ff3c;
      --toxic-bright: #39ff14;
      --line: #7dff4d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    .toxic-cubes-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 18%, rgba(184, 255, 60, 0.035), transparent 24%),
        radial-gradient(circle at 82% 72%, rgba(57, 255, 20, 0.026), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(184, 255, 60, 0.018), transparent 34%),
        linear-gradient(145deg, #050705 0%, #000 54%, #020302 100%);
    }

    .toxic-cubes-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      background: radial-gradient(
        circle at center,
        transparent 0%,
        rgba(0, 0, 0, 0.20) 54%,
        rgba(0, 0, 0, 0.86) 100%
      );
      pointer-events: none;
    }

    #toxic-cubes-canvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 0 4px rgba(184, 255, 60, 0.03));
    }
  </style>
</head>

<body>
  <div class="toxic-cubes-bg" aria-hidden="true">
    <canvas id="toxic-cubes-canvas"></canvas>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById("toxic-cubes-canvas");
      const ctx = canvas.getContext("2d", { alpha: true });

      const TOXIC = "#b8ff3c";
      const TOXIC_BRIGHT = "#39ff14";
      const LINE = "#7dff4d";

      const CUBE_SIZE = 23;
      const MERGE_DURATION = 1100;
      const FADE_IN_DURATION = 2600;
      const MIN_CUBES = 24;
      const MAX_CUBES = 34;

      let width = 0;
      let height = 0;
      let dpr = 1;
      let cubes = [];
      let particles = [];
      let merges = [];
      let cubeId = 0;
      let lastTime = 0;

      const mouse = {
        x: -9999,
        y: -9999,
        active: false,
      };

      function random(min, max) {
        return min + Math.random() * (max - min);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function smoothstep(p) {
        return p * p * (3 - 2 * p);
      }

      function chooseSpawn(side = Math.floor(random(0, 4))) {
        const padX = width * 0.26;
        const padY = height * 0.26;

        if (side === 0) return { side, x: random(-padX, width + padX), y: random(-padY, -70) };
        if (side === 1) return { side, x: random(width + 70, width + padX), y: random(-padY, height + padY) };
        if (side === 2) return { side, x: random(-padX, width + padX), y: random(height + 70, height + padY) };
        return { side, x: random(-padX, -70), y: random(-padY, height + padY) };
      }

      function targetFromSide(side) {
        const opposite = (side + 2) % 4;
        const targetSide = Math.random() > 0.78
          ? (side + (Math.random() > 0.5 ? 1 : 3)) % 4
          : opposite;

        return chooseSpawn(targetSide);
      }

      function makeCubeFromPoints(start, target, now = 0) {
        const dx = target.x - start.x;
        const dy = target.y - start.y;
        const len = Math.hypot(dx, dy) || 1;
        const speed = random(0.014, 0.032); // px/ms, very slow

        return {
          id: cubeId++,
          x: start.x,
          y: start.y,
          vx: (dx / len) * speed,
          vy: (dy / len) * speed,
          angle: random(0, Math.PI * 2),
          spinSpeed: random(-0.00011, 0.00011),
          phase: random(0, Math.PI * 2),
          floatRadiusX: random(10, 30),
          floatRadiusY: random(8, 26),
          floatSpeed: random(0.13, 0.28),
          baseAlpha: random(0.44, 0.82),
          bornAt: now,
          mergeCooldownUntil: now + 2200,
          glow: Math.random() > 0.72,
          bright: Math.random() > 0.80,
          screenX: start.x,
          screenY: start.y,
          screenAlpha: 0,
          screenScale: 1,
        };
      }

      function spawnCube(now = 0) {
        const start = chooseSpawn();
        const target = targetFromSide(start.side);
        return makeCubeFromPoints(start, target, now);
      }

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;

        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        createScene();
      }

      function createScene() {
        cubes = [];
        particles = [];
        merges = [];

        const screenFactor = Math.max(1, (width * height) / (1440 * 900));
        const cubeCount = Math.round(Math.min(MAX_CUBES, Math.max(MIN_CUBES, 26 * screenFactor)));
        const particleCount = Math.round(Math.min(95, Math.max(36, 52 * screenFactor)));

        for (let i = 0; i < cubeCount; i++) {
          const cube = spawnCube(-random(0, 28000));
          cube.x = random(-width * 0.18, width * 1.18);
          cube.y = random(-height * 0.18, height * 1.18);
          cube.bornAt = -random(FADE_IN_DURATION, 14000);
          cube.mergeCooldownUntil = random(0, 2200);
          cubes.push(cube);
        }

        for (let i = 0; i < particleCount; i++) {
          particles.push({
            x: random(0, width),
            y: random(0, height),
            r: random(0.22, 0.95),
            alpha: random(0.02, 0.09),
            vx: random(-0.018, 0.018),
            vy: random(-0.02, 0.02),
            phase: random(0, Math.PI * 2),
          });
        }
      }

      function isoPoint(x, y, z, unit, offsetX, offsetY) {
        const angle = Math.PI / 6;

        return [
          (x - y) * unit * Math.cos(angle) + offsetX,
          (x + y) * unit * Math.sin(angle) - z * unit + offsetY,
        ];
      }

      function drawFace(points, stroke, strokeAlpha, fill, fillAlpha, lineWidth) {
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);

        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i][0], points[i][1]);
        }

        ctx.closePath();

        if (fill) {
          ctx.globalAlpha = fillAlpha;
          ctx.fillStyle = fill;
          ctx.fill();
        }

        ctx.globalAlpha = strokeAlpha;
        ctx.strokeStyle = stroke;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }

      function drawSingleCube(unit, alpha, bright, t) {
        const offsetX = 0;
        const offsetY = unit * 0.65;

        const top = [
          isoPoint(0, 0, 1, unit, offsetX, offsetY),
          isoPoint(1, 0, 1, unit, offsetX, offsetY),
          isoPoint(1, 1, 1, unit, offsetX, offsetY),
          isoPoint(0, 1, 1, unit, offsetX, offsetY),
        ];

        const left = [
          isoPoint(0, 1, 1, unit, offsetX, offsetY),
          isoPoint(0, 1, 0, unit, offsetX, offsetY),
          isoPoint(1, 1, 0, unit, offsetX, offsetY),
          isoPoint(1, 1, 1, unit, offsetX, offsetY),
        ];

        const right = [
          isoPoint(1, 0, 1, unit, offsetX, offsetY),
          isoPoint(1, 0, 0, unit, offsetX, offsetY),
          isoPoint(1, 1, 0, unit, offsetX, offsetY),
          isoPoint(1, 1, 1, unit, offsetX, offsetY),
        ];

        const pulse = 0.75 + Math.sin(t * 1.1) * 0.25;
        const stroke = bright ? TOXIC : LINE;
        const fill = TOXIC;

        if (bright) {
          ctx.shadowColor = TOXIC_BRIGHT;
          ctx.shadowBlur = 1.7 + pulse * 1.6;
        }

        drawFace(top, stroke, 0.70 * alpha, fill, 0.035 * alpha, 0.72);
        drawFace(left, stroke, 0.36 * alpha, fill, 0.012 * alpha, 0.72);
        drawFace(right, stroke, 0.52 * alpha, fill, 0.020 * alpha, 0.72);

        ctx.shadowBlur = 0;
      }

      function renderCube(x, y, alpha, angle, bright, glow, t, scale = 1) {
        if (alpha <= 0.01) return;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.scale(scale, scale);

        if (glow) {
          const radius = CUBE_SIZE * 2.65;
          const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);

          gradient.addColorStop(0, "rgba(184, 255, 60, 0.021)");
          gradient.addColorStop(0.45, "rgba(184, 255, 60, 0.007)");
          gradient.addColorStop(1, "rgba(184, 255, 60, 0)");

          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(0, 0, radius, 0, Math.PI * 2);
          ctx.fill();
        }

        drawSingleCube(CUBE_SIZE, alpha, bright, t);
        ctx.restore();
      }

      function edgeFade(x, y) {
        const margin = 120;
        const fadeX = Math.min(
          clamp((x + margin) / margin, 0, 1),
          clamp((width + margin - x) / margin, 0, 1)
        );
        const fadeY = Math.min(
          clamp((y + margin) / margin, 0, 1),
          clamp((height + margin - y) / margin, 0, 1)
        );

        return Math.min(fadeX, fadeY);
      }

      function updateCube(cube, dt, timeMs, t) {
        cube.x += cube.vx * dt;
        cube.y += cube.vy * dt;
        cube.angle += cube.spinSpeed * dt;

        const waveX = Math.sin(t * cube.floatSpeed + cube.phase) * cube.floatRadiusX;
        const waveY = Math.cos(t * cube.floatSpeed * 0.82 + cube.phase) * cube.floatRadiusY;

        let x = cube.x + waveX;
        let y = cube.y + waveY;

        const dx = x - mouse.x;
        const dy = y - mouse.y;
        const distance = Math.hypot(dx, dy);
        const push = mouse.active && distance < 88 ? (1 - distance / 88) * 2 : 0;

        if (push > 0) {
          x += (dx / (distance || 1)) * push;
          y += (dy / (distance || 1)) * push;
        }

        const fadeIn = clamp((timeMs - cube.bornAt) / FADE_IN_DURATION, 0, 1);
        const fade = smoothstep(fadeIn) * edgeFade(x, y);

        cube.screenX = x;
        cube.screenY = y;
        cube.screenAlpha = cube.baseAlpha * fade;
        cube.screenScale = 1;

        const off = 260;
        if (
          x < -off ||
          x > width + off ||
          y < -off ||
          y > height + off
        ) {
          Object.assign(cube, spawnCube(timeMs));
        }
      }

      function startMerge(a, b, timeMs) {
        const midX = (a.screenX + b.screenX) / 2;
        const midY = (a.screenY + b.screenY) / 2;

        const mergedVelocityX = (a.vx + b.vx) / 2 || random(-0.012, 0.012);
        const mergedVelocityY = (a.vy + b.vy) / 2 || random(-0.012, 0.012);

        const mergedCube = {
          id: cubeId++,
          x: midX,
          y: midY,
          vx: mergedVelocityX,
          vy: mergedVelocityY,
          angle: (a.angle + b.angle) / 2,
          spinSpeed: (a.spinSpeed + b.spinSpeed) / 2,
          phase: (a.phase + b.phase) / 2,
          floatRadiusX: (a.floatRadiusX + b.floatRadiusX) / 2,
          floatRadiusY: (a.floatRadiusY + b.floatRadiusY) / 2,
          floatSpeed: Math.min(a.floatSpeed, b.floatSpeed),
          baseAlpha: clamp(Math.max(a.baseAlpha, b.baseAlpha) * 0.98, 0.42, 0.86),
          bornAt: timeMs - FADE_IN_DURATION,
          mergeCooldownUntil: timeMs + 1800,
          glow: a.glow || b.glow,
          bright: a.bright || b.bright,
          screenX: midX,
          screenY: midY,
          screenAlpha: Math.max(a.screenAlpha, b.screenAlpha),
          screenScale: 1,
        };

        merges.push({
          startTime: timeMs,
          duration: MERGE_DURATION,
          midX,
          midY,
          a: {
            x: a.screenX,
            y: a.screenY,
            alpha: a.screenAlpha,
            angle: a.angle,
            bright: a.bright,
            glow: a.glow,
          },
          b: {
            x: b.screenX,
            y: b.screenY,
            alpha: b.screenAlpha,
            angle: b.angle,
            bright: b.bright,
            glow: b.glow,
          },
          merged: mergedCube,
        });
      }

      function detectMerges(timeMs) {
        for (let i = 0; i < cubes.length; i++) {
          const a = cubes[i];
          if (!a || a.screenAlpha < 0.18 || timeMs < a.mergeCooldownUntil) continue;

          for (let j = i + 1; j < cubes.length; j++) {
            const b = cubes[j];
            if (!b || b.screenAlpha < 0.18 || timeMs < b.mergeCooldownUntil) continue;

            const dx = a.screenX - b.screenX;
            const dy = a.screenY - b.screenY;
            const distance = Math.hypot(dx, dy);
            const touchDistance = CUBE_SIZE * 1.25;

            if (distance > touchDistance) continue;

            startMerge(a, b, timeMs);

            cubes.splice(j, 1);
            cubes.splice(i, 1);

            return;
          }
        }
      }

      function drawMerges(timeMs, t) {
        const alive = [];

        for (const merge of merges) {
          const p = clamp((timeMs - merge.startTime) / merge.duration, 0, 1);
          const pull = smoothstep(p);
          const dissolve = smoothstep(clamp((p - 0.12) / 0.82, 0, 1));
          const appear = smoothstep(clamp((p - 0.20) / 0.78, 0, 1));

          const aX = lerp(merge.a.x, merge.midX, pull);
          const aY = lerp(merge.a.y, merge.midY, pull);
          const bX = lerp(merge.b.x, merge.midX, pull);
          const bY = lerp(merge.b.y, merge.midY, pull);

          const aAlpha = merge.a.alpha * (1 - dissolve);
          const bAlpha = merge.b.alpha * (1 - dissolve);
          const mergedAlpha = merge.merged.baseAlpha * appear;

          const aScale = lerp(1, 0.72, dissolve);
          const bScale = lerp(1, 0.72, dissolve);
          const mergedScale = lerp(0.72, 1, appear);

          renderCube(
            aX,
            aY,
            aAlpha,
            merge.a.angle + Math.sin(t * 0.12) * 0.018,
            merge.a.bright,
            merge.a.glow,
            t,
            aScale
          );

          renderCube(
            bX,
            bY,
            bAlpha,
            merge.b.angle - Math.sin(t * 0.12) * 0.018,
            merge.b.bright,
            merge.b.glow,
            t,
            bScale
          );

          renderCube(
            merge.midX,
            merge.midY,
            mergedAlpha,
            merge.merged.angle + Math.sin(t * 0.10 + merge.merged.phase) * 0.014,
            merge.merged.bright,
            merge.merged.glow,
            t,
            mergedScale
          );

          if (p < 1) {
            alive.push(merge);
          } else {
            merge.merged.x = merge.midX;
            merge.merged.y = merge.midY;
            merge.merged.screenX = merge.midX;
            merge.merged.screenY = merge.midY;
            merge.merged.screenAlpha = merge.merged.baseAlpha;
            cubes.push(merge.merged);
          }
        }

        merges = alive;
      }

      function keepPopulation(timeMs) {
        const total = cubes.length + merges.length;
        if (total < MIN_CUBES) {
          cubes.push(spawnCube(timeMs));
        }
      }

      function drawParticles(t, dt) {
        particles.forEach((p) => {
          p.x += p.vx * dt;
          p.y += p.vy * dt;

          if (p.x < -10) p.x = width + 10;
          if (p.x > width + 10) p.x = -10;
          if (p.y < -10) p.y = height + 10;
          if (p.y > height + 10) p.y = -10;

          const flicker = 0.55 + Math.sin(t * 1.1 + p.phase) * 0.45;

          ctx.globalAlpha = p.alpha * flicker;
          ctx.fillStyle = TOXIC;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        });

        ctx.globalAlpha = 1;
      }

      function animate(timeMs) {
        const dt = lastTime ? Math.min(34, timeMs - lastTime) : 16;
        lastTime = timeMs;

        const t = timeMs / 1000;

        ctx.clearRect(0, 0, width, height);
        drawParticles(t, dt);

        for (const cube of cubes) {
          updateCube(cube, dt, timeMs, t);
        }

        detectMerges(timeMs);

        cubes
          .slice()
          .sort((a, b) => a.screenAlpha - b.screenAlpha)
          .forEach((cube) => {
            renderCube(
              cube.screenX,
              cube.screenY,
              cube.screenAlpha,
              cube.angle + Math.sin(t * 0.18 + cube.phase) * 0.032,
              cube.bright,
              cube.glow,
              t,
              1
            );
          });

        drawMerges(timeMs, t);
        keepPopulation(timeMs);

        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", resize);

      window.addEventListener("mousemove", (event) => {
        mouse.x = event.clientX;
        mouse.y = event.clientY;
        mouse.active = true;
      });

      window.addEventListener("mouseleave", () => {
        mouse.active = false;
      });

      window.addEventListener(
        "touchmove",
        (event) => {
          if (!event.touches[0]) return;

          mouse.x = event.touches[0].clientX;
          mouse.y = event.touches[0].clientY;
          mouse.active = true;
        },
        { passive: true }
      );

      window.addEventListener("touchend", () => {
        mouse.active = false;
      });

      resize();
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
